name: pedidos
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.10.4 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_storage: ^13.4.2
  go_router: ^17.3.0
  provider: ^6.1.5+1
  intl: ^0.20.2
  image_picker: ^1.2.2
  cached_network_image: ^3.4.1
  uuid: ^4.5.3
  pdf: ^3.12.0
  printing: ^5.14.3
  excel: ^4.0.6
  path_provider: ^2.1.5
  share_plus: ^13.1.0
  shared_preferences: ^2.5.5
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  web:
    generate: true
    image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/